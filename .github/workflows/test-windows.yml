name: Test Windows Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-win-64:
    runs-on: windows-2022
    steps:
    - uses: actions/checkout@v4

    - name: Set up Miniforge
      uses: conda-incubator/setup-miniconda@v3
      with:
        miniforge-version: latest
        channels: conda-forge
        channel-priority: strict

    - name: Install conda-build and conda-forge-ci-setup
      shell: bash -el {0}
      run: |
        conda install -n base -c conda-forge conda-build conda-forge-ci-setup conda-forge-pinning

    - name: Set up conda-forge build environment
      shell: bash -el {0}
      run: |
        setup_conda_rc . recipe .ci_support/win_64_.yaml

    - name: Diagnose variant resolution
      shell: bash -el {0}
      run: |
        echo "=== conda-build version ==="
        conda build --version
        echo "=== conda_build_config.yaml (non-pkgs) ==="
        find "$CONDA_PREFIX" -name "conda_build_config.yaml" 2>/dev/null | grep -v pkgs || echo "none found"
        echo "=== conda render ==="
        conda render recipe -m .ci_support/win_64_.yaml -c conda-forge 2>&1 | grep -E "compiler|vs2022|c_win|requirements" || true

    - name: Build m4rie (win-64)
      shell: bash -el {0}
      run: |
        conda build recipe -m .ci_support/win_64_.yaml -c conda-forge --no-anaconda-upload
