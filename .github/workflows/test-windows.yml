name: Test Windows Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-win-64:
    runs-on: windows-2022
    steps:
    - uses: actions/checkout@v4

    - name: Set up Miniforge
      uses: conda-incubator/setup-miniconda@v3
      with:
        miniforge-version: latest
        channels: conda-forge
        channel-priority: strict
        activate-environment: ""

    - name: Install conda-build
      shell: bash -el {0}
      run: conda install -n base -c conda-forge conda-build conda-forge-pinning

    - name: Inspect installed conda-build internals
      shell: bash -el {0}
      run: |
        echo "=== _target() source ==="
        python -c "import inspect; from conda_build import jinja_context; print(inspect.getsource(jinja_context._target))"
        echo "=== vars in conda_build.variants ==="
        python -c "import conda_build.variants as v; print([x for x in dir(v) if not x.startswith('_')])"
        echo "=== config.variant with -m file ==="
        python -c "from conda_build.config import Config; c=Config(variant_config_files=['.ci_support/win_64_.yaml']); print('variant:', c.variant)"

    - name: Write compiler config to all locations
      shell: bash -el {0}
      run: |
        CONFIG='c_compiler:\n- vs2022\ntarget_platform:\n- win-64\n'
        printf "$CONFIG" > ~/conda_build_config.yaml
        printf "$CONFIG" > conda_build_config.yaml

    - name: Build m4rie (win-64)
      shell: bash -el {0}
      run: conda build recipe -m .ci_support/win_64_.yaml -c conda-forge --no-anaconda-upload
