name: Test Windows Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-win-64:
    runs-on: windows-2022
    steps:
    - uses: actions/checkout@v4

    - name: Set up Miniforge
      uses: conda-incubator/setup-miniconda@v3
      with:
        miniforge-version: latest
        channels: conda-forge
        channel-priority: strict
        activate-environment: ""

    - name: Install conda-build
      shell: bash -el {0}
      run: conda install -n base -c conda-forge conda-build conda-forge-pinning

    - name: Install MinGW cross-compiler into base env
      shell: bash -el {0}
      run: |
        conda install -n base -c conda-forge m2w64-gcc m2w64-binutils
        echo "MinGW installed. Verifying..."
        ls "$CONDA/Library/mingw-w64/bin/" | grep -E "gcc|ar$|ranlib" || echo "MinGW binaries not found at expected path"

    - name: Deep diagnostics
      shell: bash -el {0}
      run: |
        echo "=== exclusive_config_files ==="
        python -c "from conda_build.config import Config; c=Config(); print('exclusive:', c.exclusive_config_files)"
        echo "=== context.conda_build ==="
        python -c "from conda.base.context import context; print(dict(context.conda_build))"
        echo "=== native_compiler source ==="
        python -c "import inspect; from conda_build.jinja_context import native_compiler; print(inspect.getsource(native_compiler))"
        echo "=== DEFAULT_COMPILERS ==="
        python -c "from conda_build.variants import DEFAULT_COMPILERS; print(DEFAULT_COMPILERS)"
        echo "=== find_config_files result ==="
        python -c "from conda_build.variants import find_config_files; from conda_build.config import Config; cfg=Config(variant_config_files=['.ci_support/win_64_.yaml']); files=find_config_files('recipe', cfg); print('files:', files)"

    - name: Build m4rie (win-64)
      shell: bash -el {0}
      run: conda build recipe -m .ci_support/win_64_.yaml -c conda-forge --no-anaconda-upload --croot C:/bld
