name: Test Windows Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-win-64:
    runs-on: windows-2022
    steps:
    - uses: actions/checkout@v4

    - name: Set up Miniforge
      uses: conda-incubator/setup-miniconda@v3
      with:
        miniforge-version: latest
        channels: conda-forge
        channel-priority: strict

    - name: Install conda-build
      shell: bash -el {0}
      run: conda install -n base -c conda-forge conda-build conda-forge-pinning

    - name: Write compiler config to all locations
      shell: bash -el {0}
      run: |
        CONFIG='c_compiler:\n- vs2022\ntarget_platform:\n- win-64\n'
        printf "$CONFIG" > ~/conda_build_config.yaml
        printf "$CONFIG" > conda_build_config.yaml
        BASE=$(conda info --base)
        printf "$CONFIG" > "$BASE/conda_build_config.yaml"
        echo "=== ~/conda_build_config.yaml ===" && cat ~/conda_build_config.yaml
        echo "=== ./conda_build_config.yaml ===" && cat conda_build_config.yaml
        echo "=== conda config conda_build ===" && conda config --show conda_build || true
        echo "=== ~/.condarc ===" && cat ~/.condarc 2>/dev/null || echo "(not found)"

    - name: Debug variant with --debug
      shell: bash -el {0}
      run: conda build recipe -m .ci_support/win_64_.yaml -c conda-forge --debug 2>&1 | grep -iE "c_compiler|variant_config|exclusive|config_file|compiler|loading config" | head -50 || true

    - name: Build m4rie (win-64)
      shell: bash -el {0}
      run: conda build recipe -m .ci_support/win_64_.yaml -c conda-forge --no-anaconda-upload
