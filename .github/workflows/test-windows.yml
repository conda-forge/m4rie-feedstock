name: Test Windows Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-win-64:
    runs-on: windows-2022
    steps:
    - uses: actions/checkout@v4

    - name: Set up Miniforge
      uses: conda-incubator/setup-miniconda@v3
      with:
        miniforge-version: latest
        channels: conda-forge
        channel-priority: strict

    - name: Install conda-build
      shell: bash -el {0}
      run: conda install -n base -c conda-forge conda-build conda-forge-pinning

    - name: Inspect conda config and write user-level config
      shell: bash -el {0}
      run: |
        echo "=== conda config --show conda_build ==="
        conda config --show conda_build || true
        echo "=== ~/.condarc ==="
        cat ~/.condarc 2>/dev/null || echo "(not found)"
        echo "=== ~/conda_build_config.yaml ==="
        cat ~/conda_build_config.yaml 2>/dev/null || echo "(not found)"
        echo "=== writing to ~/conda_build_config.yaml ==="
        printf 'c_compiler:\n- vs2022\ntarget_platform:\n- win-64\n' > ~/conda_build_config.yaml
        cat ~/conda_build_config.yaml
        echo "=== also writing to cwd ==="
        printf 'c_compiler:\n- vs2022\ntarget_platform:\n- win-64\n' > conda_build_config.yaml
        cat conda_build_config.yaml

    - name: Debug conda-build variant loading
      shell: bash -el {0}
      run: |
        echo "=== config files that would be loaded ==="
        python - << 'PYEOF'
import sys, os
sys.path.insert(0, os.path.join(os.environ['CONDA_PREFIX'], 'Lib', 'site-packages'))
from conda_build import variants, config as cbconfig
cfg = cbconfig.Config(variant_config_files=['.ci_support/win_64_.yaml'])
files = variants.find_config_files('recipe', cfg)
print("Config files found:", files)
for f in files:
    print(f"\n--- {f} ---")
    with open(f) as fh:
        print(fh.read())
PYEOF
        echo "=== conda-build --debug render ==="
        conda build recipe -m .ci_support/win_64_.yaml -c conda-forge --debug 2>&1 | grep -iE "c_compiler|variant|config_file|loading|compiler" | head -40 || true

    - name: Build m4rie (win-64)
      shell: bash -el {0}
      run: conda build recipe -m .ci_support/win_64_.yaml -c conda-forge --no-anaconda-upload
