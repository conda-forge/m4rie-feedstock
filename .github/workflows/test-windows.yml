name: Test Windows Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-win-64:
    runs-on: windows-2022
    steps:
    - uses: actions/checkout@v4

    - name: Set up Miniforge
      uses: conda-incubator/setup-miniconda@v3
      with:
        miniforge-version: latest
        channels: conda-forge
        channel-priority: strict

    - name: Install conda-build
      shell: bash -el {0}
      run: conda install -n base -c conda-forge conda-build conda-forge-pinning

    - name: Create system-level conda_build_config in base env
      shell: bash -el {0}
      run: |
        BASE=$(conda info --base)
        mkdir -p "$BASE/conda-build"
        printf 'c_compiler:\n- vs2022\ntarget_platform:\n- win-64\n' \
          > "$BASE/conda-build/conda_build_config.yaml"
        echo "Written to: $BASE/conda-build/conda_build_config.yaml"
        cat "$BASE/conda-build/conda_build_config.yaml"

    - name: Diagnose variant resolution
      shell: bash -el {0}
      run: |
        echo "=== conda-build version ==="
        conda build --version
        echo "=== base prefix ==="
        conda info --base
        echo "=== conda_build_config.yaml locations (non-pkgs) ==="
        find "$(conda info --base)" -name "conda_build_config.yaml" 2>/dev/null | grep -v pkgs
        echo "=== conda render ==="
        conda render recipe -m .ci_support/win_64_.yaml -c conda-forge 2>&1 | head -60 || true

    - name: Build m4rie (win-64)
      shell: bash -el {0}
      run: conda build recipe -m .ci_support/win_64_.yaml -c conda-forge --no-anaconda-upload
